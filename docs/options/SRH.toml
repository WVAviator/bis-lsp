[options]
A = "**A** - Processes all line types. Do not use with T or U."
B = "**B[(n)]** - Stops search after the nth find. Default = first find. Search continues until items are found or end of report is reached."
C = "**C(S)** (Windows/Linux/UNIX) - Distinguishes between uppercase and lowercase letters."
D = "**D** - Omits search information lines from the result."
E = "**E(n)** (2200 only) - Estimates the number of lines in the result, where n is an integer. Improves efficiency when the output result contains more than 500 lines."
F = "**F** - Searches for a numeric value instead of a character string. Use to search for a range of negative or floating point numbers. Ignored for fields using the Y option parameter."
H = "**H** - In a multiple report search, includes heading lines of the first report only."
L = "**L(x)** - Omits lines of type x from the result. For example, L(*.a) omits asterisk, period, and A-type lines. If the omitted line type matches the type being searched, those lines are still counted in the total finds."
N = "**N** - Includes only lines not meeting the search criteria. Do not use with A, T, or U."
P = "**P** - Extracts paragraphs from the report. A paragraph consists of data on a specified line type and all subsequent lines until the next occurrence of that line type."
Q = "**Q[(n)]** - Extracts the first n paragraphs; stops after the nth paragraph. Default = first paragraph."
R = "**R x-y / R x,y / R x-y,z** - Searches a range or set of reports."
S = "**S** - Groups lines found in search parameter order. Use with H to avoid repeating report headings for each group. Does not apply to the Search Update command. Results may differ between 2200 and Windows platforms."
T = "**T[(x)]** - Includes data found on the processed line type and the preceding x type line. Default = tab line. Do not use with A, N, or U."
U = "**U[(x)]** - Includes data found on the processed line type and its surrounding data unit. A data unit starts at line type x and runs to the next line of that type. Default = tab line. Do not use with A, N, or T."
Y = "**Y[(x)]** - Searches for dates using the date format parameter line. Optionally specifies the line type of the parameter line (cannot be R, defaults to Y). Lines with invalid dates are excluded from the result."
"@" = "**@** - Indicates that `@` characters on the parameter line specify a search for spaces."
"/" = "**/** - Searches for a slant (/) character as data when used with the / parameter."
