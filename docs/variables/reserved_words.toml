description = "Start-of-entry (SOE) character."

[reserved_words."SOEH$"]
type = "I3"
description = "Horizontal cursor position of the SOE character."

[reserved_words."SOEV$"]
type = "I2"
description = "Vertical cursor position of the SOE character."

[reserved_words."SPRIV$"]
type = "I1"
description = "(OS 2200 only) User has system analyst privileges. Nonzero = yes; zero = no."

[reserved_words."STAT1$"]
type = ""
description = "Quantity or status reserved word. Contents defined per-statement in individual statement documentation."

[reserved_words."STAT2$"]
type = ""
description = "Quantity or status reserved word. Contents defined per-statement in individual statement documentation."

[reserved_words."STAT3$"]
type = ""
description = "Quantity or status reserved word. Contents defined per-statement in individual statement documentation."

[reserved_words."STAT4$"]
type = ""
description = "(OS 2200 only) Quantity or status reserved word. Contents defined per-statement."

[reserved_words."STNUM$"]
type = ""
description = "Station number executing the script. (Windows/Linux/UNIX: I5. OS 2200: size defined by HIGHST start parameter.)"

[reserved_words."SYSNAM$"]
type = "H5"
description = "Platform identification code. UNLNX = Linux; M1100 = OS 2200; SUN_S = UNIX (Sun SPARC); PWNT0 = Windows."

[reserved_words."TAB$"]
type = "H1"
description = "Tab character (ASCII 011)."

[reserved_words."TCCS$"]
type = "I4"
description = "(OS 2200 only) Terminal coded character set identifier (CCS-ID)."

[reserved_words."TIC$"]
type = "H1"
description = "Apostrophe character."

[reserved_words."TIME$"]
type = "H8"
description = "Current time in HH:MM:SS format."

[reserved_words."TITLE$"]
type = ""
description = "Title of the current -0 report, when present."

[reserved_words."TTYPE$"]
type = "H8"
description = "Terminal type of the station executing the script. (Windows/Linux/UNIX: read from the configuration report or MAPTERM environment variable.)"

[reserved_words."USER$"]
type = "H11"
description = "User-id of the user who started the script."

[reserved_words."WEBBRK$"]
type = "I1"
description = "Current output area web script interpretation mode based on the last @BRK statement. 0 = normal mode; 1 = web script literal mode; 2 = web script mode."

[reserved_words."WND$"]
type = "I6"
description = "Main workstation window handle. (GI-BIS and Windows Client only.)"

[reserved_words."WS$"]
type = "I1"
description = "Workstation session opened to a host system. Zero = not using GI-BIS or Windows Client."

[reserved_words."WSIPA$"]
type = "H15"
description = "IP address of the workstation in xxx.xxx.xxx.xxx format. Zero if not a workstation or address unavailable. (GI-BIS and Windows Client only.)"

[reserved_words."WSITE$"]
type = "S26"
description = "Unique identifier string for each host system across all platforms. Used primarily for forming unique filenames for workstation objects. (GI-BIS and Windows Client only.)"

[reserved_words."XDRW$"]
type = "I6"
description = "Drawer number of the run control report where the script aborted or failed. Used with RAR, RER."

[reserved_words."XERR$"]
type = "I6"
description = "Message number of the error encountered by an error routine (RER)."

[reserved_words."XFUN$"]
type = "H6"
description = "Last function call before the script aborted or failed. Used with RAR, RER."

[reserved_words."XKEY$"]
type = ""
description = "Key or key sequence used to transmit."

[reserved_words."XLINE$"]
type = "I6"
description = "Line number in the run control report where the script aborted or failed. Used with RAR, RER."

[reserved_words."XRID$"]
type = "I4"
description = "Report number of the run control report where the script aborted or failed. Same as XRPT$. Used with RAR, RER."

[reserved_words."XRPT$"]
type = "I4"
description = "Report number of the run control report where the script aborted or failed. Used with RAR, RER."

[reserved_words."XSSBRK$"]
type = ""
description = "Current output area XSS encode interpretation mode based on the last @BRK statement. 0 = normal; 1 = XSS encoding active; H = HTML; A = Attribute; J = JavaScript; C = CSS; U = URL encoding."

[reserved_words."XTYPE$"]
type = "I6"
description = "Drawer (form type) of the run control report where the script aborted or failed. Same as XDRW$. Used with RAR, RER."

[reserved_words."YEAR$"]
type = "I4"
description = "Current year in YYYY format."
